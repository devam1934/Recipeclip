name = "recipeclip-backend"
main = "src/handler.ts"
compatibility_date = "2024-08-21"
compatibility_flags = ["nodejs_compat"]

# Cache of extracted recipes, keyed by YouTube video id.
# Create with:  npx wrangler kv namespace create RECIPE_CACHE
# then paste the returned id below. A local namespace is used automatically
# during `wrangler dev`, so this is only needed for deploys.
[[kv_namespaces]]
binding = "RECIPE_CACHE"
id = "59782edcfbf44c5e959c5108d371ad4d"

[vars]
# Non-secret config. API keys are NOT here — they are secrets (see README).
# Which LLM to use: "gemini" (free tier) or "anthropic".
LLM_PROVIDER = "gemini"
CACHE_TTL_SECONDS = "2592000"
