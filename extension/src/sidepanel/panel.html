<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RecipeClip</title>
    <style>
      :root {
        --bg: #ffffff;
        --fg: #0f0f0f;
        --muted: #606060;
        --faint: #909090;
        --line: #e9e9e9;
        --surface: #f6f6f6;
        --accent: #ff5722;
        --accent-fg: #ffffff;
        --ok: #137333;
        --ok-bg: #e6f4ea;
        --warn: #a36a00;
        --warn-bg: #fef3df;
        --info: #185fa5;
        --info-bg: #e8f0fb;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f0f0f; --fg: #f1f1f1; --muted: #aaa; --faint: #777;
          --line: #2a2a2a; --surface: #1b1b1b;
          --ok: #6bbf85; --ok-bg: #16301f; --warn: #e0a850; --warn-bg: #322710;
          --info: #6aa9e6; --info-bg: #15243a;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 14px/1.5 Roboto, Arial, sans-serif;
        color: var(--fg);
        background: var(--bg);
      }
      #app { padding: 14px 14px 28px; }

      /* states */
      .state { text-align: center; color: var(--muted); padding: 56px 16px; }
      .state .icon { font-size: 28px; }
      .spinner {
        width: 26px; height: 26px; margin: 0 auto 14px;
        border: 3px solid var(--line); border-top-color: var(--accent);
        border-radius: 50%; animation: spin .8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* header */
      .title { font-size: 18px; font-weight: 600; margin: 0; line-height: 1.3; }
      h1.title[contenteditable]:focus { outline: none; box-shadow: 0 0 0 2px var(--accent); border-radius: 4px; }
      .top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
      .conf { font-size: 11px; padding: 2px 8px; border-radius: 10px; white-space: nowrap; background: var(--surface); color: var(--muted); }
      .conf.high { background: var(--ok-bg); color: var(--ok); }
      .conf.medium { background: var(--warn-bg); color: var(--warn); }
      .conf.low { background: var(--info-bg); color: var(--info); }

      .chips { display: flex; gap: 6px; flex-wrap: wrap; margin: 10px 0 2px; }
      .chip {
        display: inline-flex; align-items: center; gap: 5px;
        font-size: 12px; color: var(--muted); background: var(--surface);
        padding: 4px 9px; border-radius: 8px;
      }
      .chip [contenteditable] { outline: none; min-width: 14px; }
      .chip [contenteditable]:focus { box-shadow: 0 0 0 2px var(--accent); border-radius: 3px; }

      /* control bar */
      .bar {
        display: flex; justify-content: space-between; align-items: center;
        margin: 14px 0 6px; padding-bottom: 10px; border-bottom: 1px solid var(--line);
      }
      .seg { display: inline-flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
      .seg button {
        font: 500 12px Roboto, Arial, sans-serif; padding: 5px 12px;
        border: none; background: var(--bg); color: var(--muted); cursor: pointer;
      }
      .seg button.on { background: var(--fg); color: var(--bg); }
      .actions { display: flex; gap: 6px; }
      .icon-btn {
        font: 500 12px Roboto, Arial, sans-serif; padding: 5px 10px;
        border: 1px solid var(--line); border-radius: 8px; background: var(--bg);
        color: var(--muted); cursor: pointer;
      }
      .icon-btn:hover { background: var(--surface); }

      /* scale */
      .scale { display: flex; align-items: center; gap: 6px; margin: 10px 0 2px; }
      .scale .lbl { font-size: 12px; color: var(--faint); }
      .scale .seg button { padding: 3px 10px; }
      .scale .seg button.on { background: var(--accent); color: var(--accent-fg); }

      /* sections */
      .section { margin-top: 14px; }
      .section-head {
        display: flex; align-items: center; gap: 8px; cursor: pointer;
        user-select: none; padding: 4px 0;
      }
      .section-head .caret { color: var(--faint); transition: transform .15s; font-size: 11px; }
      .section-head.collapsed .caret { transform: rotate(-90deg); }
      .section-head h2 {
        font-size: 13px; font-weight: 600; text-transform: uppercase;
        letter-spacing: .04em; color: var(--muted); margin: 0;
      }
      .section-head .count { font-size: 12px; color: var(--faint); margin-left: auto; }

      /* ingredient + step rows */
      .row { display: flex; gap: 10px; align-items: flex-start; padding: 6px 0; }
      .row + .row { border-top: 1px solid var(--line); }
      .check {
        width: 17px; height: 17px; flex: none; margin-top: 1px;
        border: 1.5px solid #c4c4c4; border-radius: 4px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        color: transparent; font-size: 11px; line-height: 1;
      }
      .row.done .check { background: var(--accent); border-color: var(--accent); color: #fff; }
      .row.done .text { color: var(--faint); text-decoration: line-through; }
      .text { flex: 1; }
      .amount { font-weight: 600; }
      .tag {
        margin-left: 6px; font-size: 11px; color: var(--warn);
        background: var(--warn-bg); padding: 1px 6px; border-radius: 8px;
      }
      .num {
        width: 20px; height: 20px; flex: none; border-radius: 50%;
        background: var(--surface); color: var(--muted); cursor: pointer;
        font-size: 12px; display: flex; align-items: center; justify-content: center;
      }
      .row.done .num { background: var(--accent); color: #fff; }
      .ts {
        display: inline-flex; align-items: center; gap: 4px; margin-top: 5px;
        font-size: 12px; color: var(--info); background: var(--info-bg);
        padding: 2px 9px; border-radius: 10px; cursor: pointer;
        font-variant-numeric: tabular-nums; border: none;
      }
      .ts:hover { filter: brightness(0.96); }

      /* edit affordances */
      [contenteditable] { outline: none; border-radius: 4px; }
      [contenteditable]:focus { box-shadow: 0 0 0 2px var(--accent); }
      [contenteditable]:empty::before { content: attr(data-ph); color: #bbb; }
      .ing-edit { display: flex; gap: 6px; align-items: baseline; flex: 1; }
      .ing-edit .ing-amount { min-width: 26px; }
      .ing-edit .ing-name { flex: 1; }
      .uncertain { cursor: pointer; user-select: none; }
      .row-remove { border: none; background: none; color: #c0c0c0; cursor: pointer; font-size: 14px; padding: 0 2px; }
      .row-remove:hover { color: var(--accent); }
      .add-row {
        margin-top: 8px; border: none; background: none; color: var(--accent);
        cursor: pointer; font-size: 13px; padding: 4px 0;
      }
      .notes {
        margin-top: 14px; padding: 11px 12px; background: var(--surface);
        border-radius: 8px; color: var(--muted); font-size: 13px;
      }
      .status { color: var(--faint); font-size: 12px; margin-top: 10px; min-height: 15px; }

      /* sticky header + tabs */
      .head { position: sticky; top: 0; background: var(--bg); z-index: 5; padding-bottom: 4px; }
      .controls { display: flex; flex-wrap: wrap; gap: 14px; margin: 10px 0 2px; }
      .ctl { display: flex; align-items: center; gap: 6px; }
      .ctl .lbl { font-size: 12px; color: var(--faint); }
      .seg.accent button.on { background: var(--accent); color: var(--accent-fg); }
      .pills { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 2px; }
      .pill { font-size: 11px; padding: 2px 9px; border-radius: 10px; background: var(--info-bg); color: var(--info); }
      .tabbar { display: flex; gap: 4px; margin-top: 12px; border-bottom: 1px solid var(--line); }
      .tab {
        font: 500 13px Roboto, Arial, sans-serif; padding: 8px 11px; cursor: pointer;
        border: none; background: none; color: var(--muted);
        border-bottom: 2px solid transparent; margin-bottom: -1px;
      }
      .tab.on { color: var(--accent); border-bottom-color: var(--accent); }
      .tabbody { padding-top: 8px; }
      .summary { font-size: 14px; margin: 8px 0; line-height: 1.5; }
      .ov-label {
        font-size: 12px; font-weight: 600; text-transform: uppercase;
        letter-spacing: .04em; color: var(--muted); margin: 14px 0 6px;
      }
      .ov-facts { font-size: 13px; color: var(--muted); margin: 6px 0; }

      /* library */
      .lib-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
      .lib-head .title { font-size: 17px; }
      .lib-search {
        width: 100%; padding: 8px 10px; font: 14px Roboto, Arial, sans-serif;
        border: 1px solid var(--line); border-radius: 8px; background: var(--bg);
        color: var(--fg); margin-bottom: 8px;
      }
      .lib-item {
        display: flex; align-items: center; gap: 8px;
        padding: 10px 0; border-bottom: 1px solid var(--line);
      }
      .lib-main { flex: 1; cursor: pointer; }
      .lib-title { font-size: 14px; font-weight: 500; }
      .lib-meta { font-size: 12px; color: var(--faint); margin-top: 2px; }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script type="module" src="panel.js"></script>
  </body>
</html>
